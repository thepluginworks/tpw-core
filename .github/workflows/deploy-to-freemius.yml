name: Deploy to Freemius

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v3

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist

      - name: Zip plugin
        run: |
          zip -r tpw-flexievent.zip . -x "*.git*" -x "*.DS_Store" -x ".git*" -x ".github*"

      - name: Upload to Freemius
        run: |
          curl -X POST https://api.freemius.com/v1/plugins/${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}/versions.json \
            -H "Authorization: Basic $(echo -n '${{ secrets.TPW_CORE_EMAIL }}:${{ secrets.FREEMIUS_TPW_CORE_SECRET_KEY }}' | base64)" \
            -F "slug=${{ secrets.FLEXIEVENT_SLUG }}" \
            -F "version=$VERSION" \
            -F "changelog=Automated release from GitHub tag $VERSION" \
            -F "zip_file=@tpw-flexievent.zip"
