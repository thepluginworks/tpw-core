name: Deploy to Freemius

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set release metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - name: Build release package
        run: |
          ZIP_PATH="$RUNNER_TEMP/tpw-core-${VERSION}.zip"
          bash scripts/build-release-package.sh "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Upload package to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber

      - name: Upload to Freemius
        if: github.event_name == 'push'
        env:
          FREEMIUS_DEV_ID: ${{ secrets.FREEMIUS_DEV_ID }}
          FREEMIUS_PUBLIC_KEY: ${{ secrets.FREEMIUS_PUBLIC_KEY }}
          FREEMIUS_SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          FREEMIUS_PLUGIN_ID: ${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}
        run: |
          echo "Freemius upload VERSION: $VERSION"
          echo "Freemius upload ZIP_PATH: $ZIP_PATH"
          python3 - <<'PY'
          import base64
          import hashlib
          import hmac
          import json
          import mimetypes
          import os
          import sys
          import time
          import urllib.error
          import urllib.parse
          import urllib.request
          import uuid
          from datetime import datetime, timezone

          API_ROOT = 'https://api.freemius.com'
          API_VERSION = '1'
          EOL = '\n'
          RELEASE_BLOCKING_MODES = {'unreleased', 'pending', 'beta'}

          dev_id = os.environ['FREEMIUS_DEV_ID']
          public_key = os.environ['FREEMIUS_PUBLIC_KEY']
          secret_key = os.environ['FREEMIUS_SECRET_KEY']
          plugin_id = os.environ['FREEMIUS_PLUGIN_ID']
          zip_path = os.environ['ZIP_PATH']

          def rfc2822_utc_now():
            return datetime.now(timezone.utc).strftime('%a, %d %b %Y %H:%M:%S +0000')

          def json_encode_sdk(value):
            return json.dumps(value, separators=(',', ':'))

          def base64_url_encode_sdk(value):
            return base64.urlsafe_b64encode(value.encode('utf-8')).decode('ascii').rstrip('=')

          def canonize_path(path):
            path = path.strip('/')
            query = ''

            if '?' in path:
              path, raw_query = path.split('?', 1)
              query = f'?{raw_query}'

            if path.lower().endswith('.json'):
              path = path[:-5]

            base = f'/developers/{dev_id}'
            suffix = '.json' if '.' not in path else ''

            return f'/v{API_VERSION}{base}{"/" if path else ""}{path}{suffix}{query}'

          def log_response(label, status, raw_body):
            print(f'{label} HTTP status: {status}')
            print(f'{label} response body size: {len(raw_body)} bytes')
            if raw_body:
              print(f'{label} raw response body:')
              print(raw_body.decode('utf-8', errors='replace'))
            else:
              print(f'{label} response body is empty.')

          def generate_authorization_params(resource_path, method='GET', json_encoded_params='', content_type=''):
            date_header = rfc2822_utc_now()
            content_md5 = ''

            if method in {'POST', 'PUT'} and json_encoded_params:
              content_md5 = hashlib.md5(json_encoded_params.encode('utf-8')).hexdigest()

            string_to_sign = EOL.join([
              method,
              content_md5,
              content_type,
              date_header,
              resource_path,
            ])
            auth_type = 'FSP' if secret_key == public_key else 'FS'
            signature = base64_url_encode_sdk(
              hmac.new(
                secret_key.encode('utf-8'),
                string_to_sign.encode('utf-8'),
                hashlib.sha256,
              ).hexdigest()
            )

            auth = {
              'date': date_header,
              'authorization': f'{auth_type} {dev_id}:{public_key}:{signature}',
            }

            if content_md5:
              auth['content_md5'] = content_md5

            return auth

          def build_headers(resource_path, signing_method, json_encoded_params, content_type):
            auth = generate_authorization_params(resource_path, signing_method, json_encoded_params, content_type)
            headers = {
              'Authorization': auth['authorization'],
              'Content-Type': content_type,
              'Date': auth['date'],
              'Expect': '',
            }

            if 'content_md5' in auth:
              headers['Content-MD5'] = auth['content_md5']

            return headers

          def build_multipart_body(params, file_params, boundary):
            body = bytearray()

            for name, value in params.items():
              body.extend(f'--{boundary}{EOL}'.encode('utf-8'))
              body.extend(f'Content-Disposition: form-data; name="{name}"{EOL}'.encode('utf-8'))
              body.extend(EOL.encode('utf-8'))
              body.extend(str(value).encode('utf-8'))
              body.extend(EOL.encode('utf-8'))

            for name, file_path in file_params.items():
              filename = os.path.basename(file_path)
              mime_type = mimetypes.guess_type(filename)[0] or 'application/zip'
              with open(file_path, 'rb') as file_handle:
                file_bytes = file_handle.read()

              body.extend(f'--{boundary}{EOL}'.encode('utf-8'))
              body.extend(
                f'Content-Disposition: form-data; name="{name}"; filename="{filename}"{EOL}'.encode('utf-8')
              )
              body.extend(f'Content-Type: {mime_type}{EOL}'.encode('utf-8'))
              body.extend(EOL.encode('utf-8'))
              body.extend(file_bytes)
              body.extend(EOL.encode('utf-8'))

            body.extend(f'--{boundary}--'.encode('utf-8'))
            return bytes(body)

          def api_request(label, path, method='GET', params=None, file_params=None):
            params = params or {}
            file_params = file_params or {}
            canonical_path = canonize_path(path)
            actual_method = method.upper()
            signing_method = actual_method
            content_type = 'application/json'
            json_encoded_params = json_encode_sdk(params) if params else ''
            request_body = None

            if actual_method in {'POST', 'PUT'}:
              if file_params:
                multipart_params = {} if not json_encoded_params else {'data': json_encoded_params}
                json_encoded_params = ''
                now = time.time()
                boundary = '----' + f'{int(now):08x}{int((now - int(now)) * 1000000):05x}'
                request_body = build_multipart_body(multipart_params, file_params, boundary)
                content_type = f'multipart/form-data; boundary={boundary}'

                if actual_method == 'PUT':
                  separator = '&' if '?' in canonical_path else '?'
                  canonical_path = f'{canonical_path}{separator}method=PUT'
                  signing_method = actual_method
                  actual_method = 'POST'
              else:
                request_body = json_encoded_params.encode('utf-8')
            elif actual_method in {'GET', 'DELETE'} and params:
              separator = '&' if '?' in canonical_path else '?'
              canonical_path = f'{canonical_path}{separator}{urllib.parse.urlencode(params)}'

            resource_path = canonical_path.split('?', 1)[0]
            headers = build_headers(resource_path, signing_method, json_encoded_params, content_type)
            request = urllib.request.Request(
              API_ROOT + canonical_path,
              data=request_body if actual_method in {'POST', 'PUT'} else None,
              headers=headers,
              method=actual_method,
            )

            try:
              with urllib.request.urlopen(request) as response:
                raw_body = response.read()
                status = response.getcode()
            except urllib.error.HTTPError as error:
              raw_body = error.read()
              status = error.code

            log_response(label, status, raw_body)
            return status, raw_body

          def parse_json(raw_body):
            if not raw_body:
              return {}

            try:
              return json.loads(raw_body.decode('utf-8'))
            except json.JSONDecodeError:
              return {}

          def extract_tag(payload):
            if isinstance(payload, dict) and isinstance(payload.get('tag'), dict):
              return payload['tag']
            if isinstance(payload, dict):
              return payload
            return {}

          upload_status, upload_raw_body = api_request(
            'Freemius upload',
            f'plugins/{plugin_id}/tags.json',
            method='POST',
            params={'add_contributor': True},
            file_params={'file': zip_path},
          )

          if upload_status < 200 or upload_status >= 300:
            print(f'::error::Freemius upload failed with HTTP status {upload_status}')
            sys.exit(1)

          upload_payload = parse_json(upload_raw_body)
          tag = extract_tag(upload_payload)
          tag_id = tag.get('id')
          release_mode = tag.get('release_mode')

          print(f'Freemius uploaded tag id: {tag_id}')
          print(f'Freemius uploaded tag release_mode: {release_mode}')

          if not tag_id:
            print('::error::Freemius upload response did not include a tag id')
            sys.exit(1)

          if release_mode not in RELEASE_BLOCKING_MODES:
            print('Freemius tag is already in a released state.')
            sys.exit(0)

          release_payloads = [
            {'release_mode': None},
            {'release_mode': ''},
            {'is_released': True},
          ]

          for candidate in release_payloads:
            print(f'Attempting Freemius tag release with payload: {json.dumps(candidate)}')
            release_status, release_raw_body = api_request(
              'Freemius release',
              f'plugins/{plugin_id}/tags/{tag_id}.json',
              method='PUT',
              params=candidate,
            )

            if release_status < 200 or release_status >= 300:
              continue

            release_response = extract_tag(parse_json(release_raw_body))
            current_mode = release_response.get('release_mode')
            print(f'Freemius released tag release_mode: {current_mode}')

            if current_mode not in RELEASE_BLOCKING_MODES:
              print('Freemius tag is now released.')
              sys.exit(0)

          print('::error::Freemius tag was uploaded but could not be moved into a released state')
          sys.exit(1)
          PY
