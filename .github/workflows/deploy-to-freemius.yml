name: Deploy to Freemius

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v3

      - name: Set version from tag
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist

      - name: Zip plugin
        run: |
          zip -r tpw-core.zip . -x "*.git*" -x "*.DS_Store"

      - name: Confirm secret is working
        run: |
          echo "Plugin ID: ${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}"

      - name: Debug version string
        run: | 
          echo "Uploading version: $VERSION"

      - name: Debug final Freemius URL
        run: |
          echo POST URL: https://api.freemius.com/v1/dev/plugins/${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}/versions.json

      - name: Upload to Freemius
        run: |
          echo "Uploading to https://api.freemius.com/v1/dev/plugins/${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}/versions.json with version ${VERSION}"
          curl -X POST "https://api.freemius.com/v1/dev/plugins/${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}/versions.json" \
            -u "${{ secrets.FREEMIUS_TPW_CORE_PUBLIC_KEY }}:${{ secrets.FREEMIUS_TPW_CORE_SECRET_KEY }}" \
            -F "plugin_file=@tpw-core.zip" \
            -F "version=${VERSION}"
