name: Deploy to Freemius

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v3

      - name: Set version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist

      - name: Zip plugin
        run: |
          zip -r tpw-core.zip . -x "*.git*" -x "*.DS_Store" -x ".git*" -x ".github*"

      - name: Deploy to Freemius
        uses: buttonizer/freemius-deploy@v0.1.2
        with:
          file_name: tpw-core.zip
          release_mode: pending
          version: ${{ env.VERSION }}
          sandbox: false
        env:
          PUBLIC_KEY: ${{ secrets.FREEMIUS_PUBLIC_KEY }}
          DEV_ID: ${{ secrets.FREEMIUS_DEV_ID }}
          SECRET_KEY: ${{ secrets.FREEMIUS_SECRET_KEY }}
          PLUGIN_SLUG: ${{ secrets.FREEMIUS_TPW_CORE_SLUG }}
          PLUGIN_ID: ${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}
