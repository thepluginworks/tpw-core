

name: Deploy to Freemius

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v3

      - name: Set version from tag
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Install PHP dependencies
        run: composer install --no-dev --prefer-dist

      - name: Zip plugin
        run: |
          zip -r tpw-core.zip . -x "*.git*" -x "*.DS_Store"

      - name: Upload to Freemius
        env:
          FREEMIUS_ID: ${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}
          FREEMIUS_PUBLIC_KEY: ${{ secrets.FREEMIUS_TPW_CORE_PUBLIC_KEY }}
          FREEMIUS_SECRET_KEY: ${{ secrets.FREEMIUS_TPW_CORE_SECRET_KEY }}
        run: |
          echo "Uploading to https://api.freemius.com/v1/dev/plugins/${FREEMIUS_ID}/versions.json with version ${VERSION}"
          curl -X POST "https://api.freemius.com/v1/dev/plugins/${FREEMIUS_ID}/versions.json" \
            -u "${FREEMIUS_PUBLIC_KEY}:${FREEMIUS_SECRET_KEY}" \
            -F "plugin_file=@tpw-core.zip" \
            -F "version=${VERSION}"
