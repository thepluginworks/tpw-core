name: Deploy to Freemius

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set release metadata
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "VERSION=${TAG_NAME#v}" >> $GITHUB_ENV

      - name: Build release package
        run: |
          ZIP_PATH="$RUNNER_TEMP/tpw-core-${VERSION}.zip"
          bash scripts/build-release-package.sh "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      - name: Upload package to GitHub release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$TAG_NAME" "$ZIP_PATH" --clobber

      - name: Upload to Freemius
        if: github.event_name == 'push'
        run: |
          set -x

          RESPONSE_BODY="$RUNNER_TEMP/freemius-upload-response.json"
          : > "$RESPONSE_BODY"

          echo "Freemius upload VERSION: $VERSION"
          echo "Freemius upload ZIP_PATH: $ZIP_PATH"

          HTTP_STATUS=$(curl -sS \
            --output "$RESPONSE_BODY" \
            -w "%{http_code}" \
            -X POST "https://api.freemius.com/v1/plugins/${{ secrets.FREEMIUS_TPW_CORE_PLUGIN_ID }}/versions.json" \
            -H "Authorization: Basic $(echo -n '${{ secrets.TPW_CORE_EMAIL }}:${{ secrets.FREEMIUS_SECRET_KEY }}' | base64)" \
            -F "slug=${{ secrets.FREEMIUS_TPW_CORE_SLUG }}" \
            -F "version=$VERSION" \
            -F "changelog=Automated release from GitHub tag $VERSION" \
            -F "zip_file=@$ZIP_PATH")

          echo "Freemius upload HTTP status: $HTTP_STATUS"

          if [ -f "$RESPONSE_BODY" ]; then
            RESPONSE_SIZE=$(wc -c < "$RESPONSE_BODY")
          else
            RESPONSE_SIZE=0
          fi

          echo "Freemius upload response body size: ${RESPONSE_SIZE} bytes"

          if [ "$RESPONSE_SIZE" -gt 0 ]; then
            echo "Freemius upload raw response body:"
            cat "$RESPONSE_BODY"
          else
            echo "Freemius upload response body is empty."
          fi

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Freemius upload failed with HTTP status $HTTP_STATUS"
            exit 1
          fi
